<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>售后问题解答</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f8f9fb;
      color: #191c1e;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding-bottom: 88px;
    }

    /* ── Header — dark navy metallic ───────────────────── */
    .header {
      background: linear-gradient(135deg, #1A2B4A 0%, #031634 100%);
      position: sticky;
      top: 0;
      z-index: 200;
      overflow: hidden;
    }
    .header::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.06) 0%, transparent 55%);
      pointer-events: none;
    }
    .header-inner { position: relative; z-index: 1; }
    .header-titlebar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 0;
      gap: 8px;
    }
    .header-icon { font-size: 16px; opacity: 0.85; }
    .header-title {
      font-family: 'Manrope', -apple-system, sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    /* Search section (white card) */
    .search-section {
      background: #fff;
      border-radius: 0 0 28px 28px;
      margin-top: 12px;
      padding: 16px 16px 4px;
      box-shadow: 0 20px 40px rgba(25,28,30,0.04);
    }
    .search-bar { position: relative; margin-bottom: 12px; }
    .search-bar input {
      width: 100%;
      height: 48px;
      padding: 0 44px 0 46px;
      border: 1.5px solid rgba(197,198,207,0.4);
      border-radius: 14px;
      background: #f2f4f6;
      font-size: 14px;
      font-family: inherit;
      color: #191c1e;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-bar input:focus {
      background: #fff;
      border-color: #4e5e80;
      box-shadow: 0 0 0 3px rgba(78,94,128,0.12);
    }
    .search-bar input::placeholder { color: #94959a; }
    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #94959a;
      pointer-events: none;
    }
    .clear-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #bbb;
      cursor: pointer;
      display: none;
      padding: 6px;
      line-height: 1;
    }

    /* Category pills */
    .cats-scroll {
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      padding: 0 0 14px;
      gap: 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }
    .cats-scroll::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 999px;
      background: transparent;
      border: 1.5px solid rgba(117,119,126,0.3);
      color: #44474e;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      user-select: none;
      transition: all 0.18s;
    }
    .cat-btn:active { transform: scale(0.95); }
    .cat-btn.active {
      background: #d3e3ff;
      border-color: #d3e3ff;
      color: #031634;
      font-weight: 700;
    }

    /* ── Main ─────────────────────────────────────────── */
    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 14px 20px;
    }
    .result-hint {
      font-size: 11px;
      font-weight: 600;
      color: #94959a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 4px 12px;
    }

    /* ── FAQ Card ─────────────────────────────────────── */
    .faq-card {
      background: #fff;
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(25,28,30,0.04);
      transition: box-shadow 0.3s;
    }
    .faq-card:hover {
      box-shadow: 0 20px 40px rgba(25,28,30,0.08);
    }
    .faq-q {
      display: flex;
      align-items: flex-start;
      padding: 18px 18px 16px;
      cursor: pointer;
      gap: 12px;
      user-select: none;
    }
    .faq-q-content { flex: 1; min-width: 0; }
    .faq-cat-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1A2B4A;
      background: rgba(211,227,255,0.5);
      border-radius: 6px;
      padding: 2px 9px;
      margin-bottom: 7px;
    }
    .faq-q-text {
      font-size: 16px;
      font-weight: 600;
      color: #191c1e;
      line-height: 1.45;
      padding-right: 4px;
    }
    .faq-tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }
    .faq-tag-item {
      font-size: 10px;
      color: #44474e;
      border: 1px solid rgba(117,119,126,0.28);
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 500;
    }
    .faq-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f2f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #75777e;
      font-size: 11px;
      margin-top: 2px;
      transition: transform 0.25s, background 0.2s, color 0.2s;
    }
    .faq-card.open .faq-arrow {
      transform: rotate(180deg);
      background: #d3e3ff;
      color: #031634;
    }

    /* Answer panel */
    .faq-panel {
      display: none;
      border-top: 1px solid #f2f4f6;
      animation: slideDown 0.22s ease;
    }
    .faq-card.open .faq-panel { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .faq-answer {
      padding: 16px 18px 10px;
      font-size: 14px;
      color: #44474e;
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .faq-answer strong { color: #191c1e; font-weight: 600; }

    .faq-imgs {
      padding: 0 18px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .faq-imgs img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid #f0f0f0;
      display: block;
      cursor: zoom-in;
    }

    .faq-video-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 18px 12px;
      padding: 11px 16px;
      background: #f2f4f6;
      border-radius: 10px;
      color: #1A2B4A;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .faq-video-btn:active { background: #e7e8ea; }
    .faq-video-btn::before {
      content: '🎬';
      font-size: 16px;
    }

    /* Feedback section */
    .feedback-trigger-row {
      padding: 6px 18px 16px;
    }
    .trigger-btn {
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: 1.5px dashed rgba(117,119,126,0.35);
      border-radius: 10px;
      color: #75777e;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .trigger-btn:active,
    .trigger-btn:hover {
      border-color: #4e5e80;
      color: #1A2B4A;
      background: rgba(211,227,255,0.2);
    }

    .feedback-form-section {
      display: none;
      padding: 0 18px 18px;
    }
    .feedback-form-section.open { display: block; }

    /* ── Form ─────────────────────────────────────────── */
    .f-group { margin-bottom: 10px; }
    .f-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #75777e;
      letter-spacing: 0.03em;
      margin-bottom: 5px;
    }
    .f-group input,
    .f-group textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid rgba(197,198,207,0.5);
      border-radius: 10px;
      font-size: 14px;
      color: #191c1e;
      background: #f8f9fb;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .f-group input:focus,
    .f-group textarea:focus {
      background: #fff;
      border-color: #4e5e80;
      box-shadow: 0 0 0 3px rgba(78,94,128,0.12);
    }
    .f-group textarea {
      resize: vertical;
      min-height: 85px;
      line-height: 1.65;
    }
    .f-bot-check {
      position: absolute;
      left: -9999px;
      opacity: 0;
      height: 0;
    }
    .f-actions { display: flex; gap: 8px; margin-top: 14px; }
    .f-btn-cancel {
      flex: 1;
      padding: 11px;
      background: none;
      border: 1.5px solid rgba(197,198,207,0.5);
      border-radius: 999px;
      color: #75777e;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .f-btn-submit {
      flex: 2;
      padding: 11px;
      background: linear-gradient(135deg, #1A2B4A 0%, #031634 100%);
      border: none;
      border-radius: 999px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 8px 20px rgba(3,22,52,0.25);
      transition: opacity 0.2s, transform 0.15s;
    }
    .f-btn-submit:active { transform: scale(0.97); opacity: 0.9; }
    .f-btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .f-sent-msg {
      display: none;
      text-align: center;
      padding: 14px;
      font-size: 14px;
      font-weight: 500;
      color: #1a7f37;
      background: #eafaef;
      border: 1px solid #b4e5c3;
      border-radius: 10px;
      margin-top: 6px;
    }
    .f-warn {
      font-size: 12px;
      color: #b95000;
      margin-top: 8px;
      text-align: center;
      background: #fff8f0;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(185,80,0,0.15);
    }

    /* ── No Results ─────────────────────────────────────── */
    .no-results { display: none; padding: 24px 0 16px; }
    .no-results.show { display: block; }

    .no-results-editorial {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .no-results-blur-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1A2B4A 0%, #031634 100%);
    }
    .no-results-blur-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(211,227,255,0.15) 0%, transparent 60%);
    }
    .no-results-inner {
      position: relative;
      z-index: 1;
      padding: 32px 20px;
      text-align: center;
    }
    .no-results-inner .icon { font-size: 40px; margin-bottom: 12px; display: block; }
    .no-results-inner h3 {
      font-family: 'Manrope', -apple-system, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .no-results-inner p {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      max-width: 240px;
      margin: 0 auto 16px;
      line-height: 1.65;
    }
    .clear-link {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      color: #d3e3ff;
      cursor: pointer;
      padding: 2px 0;
      border-bottom: 1px solid rgba(211,227,255,0.4);
    }

    .no-results-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 18px;
      box-shadow: 0 10px 30px rgba(25,28,30,0.04);
    }
    .no-results-card h4 {
      font-size: 15px;
      font-weight: 600;
      color: #191c1e;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f2f4f6;
    }

    /* ── Loading / Error ─────────────────────────────────── */
    .app-error {
      text-align: center;
      padding: 60px 20px;
      color: #ba1a1a;
      font-size: 14px;
    }
    .app-error small {
      display: block;
      color: #94959a;
      font-size: 12px;
      margin-top: 10px;
      line-height: 1.8;
    }

    /* ── Lightbox ─────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 100%;
      max-height: 92vh;
      border-radius: 8px;
      display: block;
    }
    .lb-close {
      position: absolute;
      top: 12px;
      right: 16px;
      color: #fff;
      font-size: 30px;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-close:hover { opacity: 1; }

    /* Keyword highlight */
    mark {
      background: #ffe58f;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── Bottom Nav ────────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 16px 20px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(197,198,207,0.2);
      border-radius: 24px 24px 0 0;
      z-index: 100;
      box-shadow: 0 -10px 30px rgba(25,28,30,0.05);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 20px;
      border-radius: 14px;
      border: none;
      background: none;
      font-family: inherit;
      color: #75777e;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active {
      background: #f2f4f6;
      color: #1A2B4A;
      font-weight: 700;
    }
    .nav-icon { font-size: 20px; line-height: 1; }

    @media (min-width: 640px) {
      .header-title { font-size: 20px; }
      .main { padding: 24px 24px 20px; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="header-inner">
    <div class="header-titlebar">
      <span class="header-icon">🔧</span>
      <span class="header-title">售后问题解答</span>
    </div>
    <div class="search-section">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="search" id="searchInput"
               placeholder="输入关键词搜索，如：没声音、蓝牙…" autocomplete="off">
        <span class="clear-icon" id="clearIcon" onclick="clearSearch()">×</span>
      </div>
      <div class="cats-scroll" id="catContainer">
        <!-- 分类标签由 JS 渲染 -->
      </div>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="result-hint" id="resultHint"></div>
  <div id="faqContainer"></div>

  <!-- 无搜索结果状态 -->
  <div class="no-results" id="noResults">
    <div class="no-results-editorial">
      <div class="no-results-blur-bg"></div>
      <div class="no-results-blur-overlay"></div>
      <div class="no-results-inner">
        <span class="icon">🔎</span>
        <h3>没有找到相关问题</h3>
        <p>换个关键词试试，或者直接告诉我们你遇到的问题</p>
        <span class="clear-link" onclick="clearSearch()">← 清除搜索重试</span>
      </div>
    </div>
    <div class="no-results-card">
      <h4>📝 告诉我们你的问题</h4>
      <div id="noResultsFormWrap"></div>
    </div>
  </div>
</div>

<!-- ===== LIGHTBOX ===== -->
<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lbClose">×</span>
  <img id="lbImg" src="" alt="图片预览">
</div>

<!-- ===== BOTTOM NAV ===== -->
<nav class="bottom-nav">
  <button class="nav-item active" id="navHome" onclick="navHome()">
    <span class="nav-icon">🏠</span>首页
  </button>
  <button class="nav-item" id="navSearch" onclick="navSearch()">
    <span class="nav-icon">🔍</span>搜索
  </button>
  <button class="nav-item" id="navFeedback" onclick="navFeedback()">
    <span class="nav-icon">💬</span>反馈
  </button>
</nav>

<script>
// ================================================================
// 【配置区域 — 上线前请修改这里】
// ================================================================
//
// 邮件通知配置（使用 Formspree 免费服务）：
// 步骤：
//   1. 前往 https://formspree.io 用 whaha373w@gmail.com 注册账号
//   2. 点击 "+ New Form"，填写表单名称，创建后复制表单 ID（如 xpwzjkla）
//   3. 将下面引号里的 YOUR_FORM_ID 替换为你的表单 ID
//
const FORMSPREE_ID = 'YOUR_FORM_ID';
// ================================================================

const FORM_ACTION = FORMSPREE_ID !== 'YOUR_FORM_ID'
  ? `https://formspree.io/f/${FORMSPREE_ID}`
  : null;

// ================================================================
// 【问答数据区域 — 在这里增加/修改问题和答案】
//
// 每条问答格式说明：
//   id        : 数字，每条唯一，递增即可
//   category  : 分类名，必须是下方 CATEGORIES 列表里的其中一个
//   question  : 问题标题
//   answer    : 答案正文（支持 **粗体**，⚠️ 开头的行显示橙色警告）
//   images    : 图片地址列表，填网络图片URL，没有就留 []
//   video     : 视频链接，没有就留 ""
//   tags      : 搜索关键词列表，帮助搜索匹配
// ================================================================
const CATEGORIES = ['音频问题', '连接问题', '显示问题', '操作问题', '其他问题'];

const FAQ_DATA = [
  {
    id: 1,
    category: '音频问题',
    question: '设备播放没有声音怎么办？',
    answer: '请按照以下步骤逐一排查：\n\n**1. 检查音量设置**\n确认设备音量未调到最低或静音，长按音量+键3秒。\n\n**2. 检查音频线连接**\n确认音频线两端插紧，无松动现象，建议拔出重新插入。\n\n**3. 检查播放源**\n切换播放不同内容，确认是否所有内容都无声。\n\n**4. 重启设备**\n关机等待10秒后重新开机，等待设备完全启动后再测试。\n\n**5. 恢复出厂设置**\n长按设备背后的RESET键5秒。\n⚠️ 注意：此操作会清除所有自定义设置。\n\n若以上操作均无效，请通过下方反馈告知我们。',
    images: [],
    video: '',
    tags: ['无声音', '音量', '静音', '音频线']
  },
  {
    id: 2,
    category: '连接问题',
    question: '蓝牙连接不上或经常断开怎么解决？',
    answer: '蓝牙问题排查步骤：\n\n**1. 检查距离**\n确保设备与手机距离在10米以内，中间无金属遮挡物。\n\n**2. 删除旧配对记录**\n在手机「设置 → 蓝牙」中找到设备，选择"忘记此设备"，再重新搜索配对。\n\n**3. 重置蓝牙模块**\n长按设备蓝牙键10秒，等待指示灯快速闪烁后重新搜索配对。\n\n**4. 排除干扰**\n关闭附近其他蓝牙设备，避免信号干扰。\n\n**5. 检查固件更新**\n通过官方APP检查是否有可用的固件更新。',
    images: [],
    video: '',
    tags: ['蓝牙', '断开', '连接失败', '配对']
  },
  {
    id: 3,
    category: '显示问题',
    question: '显示屏没有画面或黑屏怎么处理？',

// ================================================================
// 【数据区域结束】
// ================================================================

let faqData = FAQ_DATA;
let categories = ['全部', ...CATEGORIES];
let currentCat = '全部';
let currentKw  = '';

// ── 初始化 ────────────────────────────────────────────────────────
function init() {
  renderCats();
  render();
}

// ── 分类标签 ──────────────────────────────────────────────────────
function renderCats() {
  document.getElementById('catContainer').innerHTML = categories
    .map(c => `<span class="cat-btn${c === currentCat ? ' active' : ''}" data-cat="${esc(c)}">${esc(c)}</span>`)
    .join('');
}

// ── 渲染 FAQ 列表 ─────────────────────────────────────────────────
function render() {
  const kw       = currentKw.toLowerCase();
  const filtered = faqData.filter(f => {
    const catOk = currentCat === '全部' || f.category === currentCat;
    const kwOk  = !kw
      || f.question.toLowerCase().includes(kw)
      || f.answer.toLowerCase().includes(kw)
      || (f.tags || []).some(t => t.toLowerCase().includes(kw));
    return catOk && kwOk;
  });

  const container = document.getElementById('faqContainer');
  const noResults = document.getElementById('noResults');
  const hint      = document.getElementById('resultHint');

  if (filtered.length === 0) {
    container.innerHTML = '';
    noResults.classList.add('show');
    hint.textContent = '';
    renderNoResultsForm();
  } else {
    noResults.classList.remove('show');
    hint.textContent = (kw || currentCat !== '全部')
      ? `找到 ${filtered.length} 条相关问题`
      : `共 ${filtered.length} 条问题`;
    container.innerHTML = filtered.map(buildCard).join('');
  }
}

// ── 构建 FAQ 卡片 HTML ────────────────────────────────────────────
function buildCard(f) {
  const tags = (f.tags || [])
    .map(t => `<span class="faq-tag-item">${esc(t)}</span>`)
    .join('');
  const imgs = (f.images || []).filter(Boolean)
    .map(src => `<img src="${esc(src)}" data-src="${esc(src)}" alt="操作示意图">`)
    .join('');
  const videoHtml = f.video
    ? `<a class="faq-video-btn" href="${esc(f.video)}" target="_blank">观看操作视频演示</a>`
    : '';

  return `
<div class="faq-card" data-id="${f.id}">
  <div class="faq-q">
    <div class="faq-q-content">
      <span class="faq-cat-badge">${esc(f.category)}</span>
      <div class="faq-q-text">${hl(f.question)}</div>
      <div class="faq-tags-row">${tags}</div>
    </div>
    <div class="faq-arrow">▾</div>
  </div>
  <div class="faq-panel">
    <div class="faq-answer">${fmt(f.answer)}</div>
    ${imgs ? `<div class="faq-imgs">${imgs}</div>` : ''}
    ${videoHtml}
    <div class="feedback-trigger-row">
      <button class="trigger-btn" data-id="${f.id}">😕 看完还是没解决？点击反馈</button>
    </div>
    <div class="feedback-form-section" id="ff-${f.id}">
      ${buildForm('f-' + f.id, esc(f.question), true)}
    </div>
  </div>
</div>`;
}

// ── 构建反馈表单 HTML ─────────────────────────────────────────────
function buildForm(formId, relatedQuestion, showCancel) {
  const cancelBtn = showCancel
    ? `<button type="button" class="f-btn-cancel" onclick="cancelFeedback(this)">取消</button>`
    : '';
  const warnHtml = !FORM_ACTION
    ? `<p class="f-warn">⚠️ 请先在 index.html 顶部配置 Formspree ID，才能启用邮件通知</p>`
    : '';
  return `
<form id="form-${formId}" onsubmit="submitForm(event,'${formId}')">
  <input type="text" name="_gotcha" class="f-bot-check" tabindex="-1" autocomplete="off">
  <input type="hidden" name="related_question" value="${relatedQuestion}">
  <div class="f-group">
    <label>姓名 / 昵称</label>
    <input type="text" name="name" placeholder="请输入你的称呼" required maxlength="50">
  </div>
  <div class="f-group">
    <label>联系方式（微信号或手机号）</label>
    <input type="text" name="contact" placeholder="方便我们联系你" required maxlength="50">
  </div>
  <div class="f-group">
    <label>问题描述</label>
    <textarea name="message"
      placeholder="请详细说明问题，例如：设备型号、出现的现象、已尝试过哪些方法…"
      required maxlength="500"></textarea>
  </div>
  <div class="f-actions">
    ${cancelBtn}
    <button type="submit" class="f-btn-submit" id="sbtn-${formId}">📨 提交问题</button>
  </div>
  <div class="f-sent-msg" id="sent-${formId}">✅ 已收到你的问题，我们会尽快联系你！</div>
  ${warnHtml}
</form>`;
}

// ── 无结果区域表单 ────────────────────────────────────────────────
function renderNoResultsForm() {
  document.getElementById('noResultsFormWrap').innerHTML =
    buildForm('no-results', esc(currentKw || '未指定关键词'), false);
}

// ── 表单提交 ──────────────────────────────────────────────────────
async function submitForm(e, formId) {
  e.preventDefault();

  if (!FORM_ACTION) {
    alert(
      '⚠️ 表单服务尚未配置。\n\n' +
      '请在 index.html 顶部将 YOUR_FORM_ID 替换为你的 Formspree 表单 ID。\n' +
      '注册地址：https://formspree.io'
    );
    return;
  }

  const form    = document.getElementById('form-' + formId);
  const btn     = document.getElementById('sbtn-' + formId);
  const sentMsg = document.getElementById('sent-' + formId);

  btn.disabled    = true;
  btn.textContent = '提交中…';

  try {
    const res = await fetch(FORM_ACTION, {
      method: 'POST',
      body: new FormData(form),
      headers: { Accept: 'application/json' }
    });
    if (!res.ok) throw new Error(res.status);
    form.style.display    = 'none';
    sentMsg.style.display = 'block';
  } catch {
    btn.disabled    = false;
    btn.textContent = '📨 提交问题';
    alert('提交失败，请检查网络后重试。');
  }
}

// ── 取消反馈 ──────────────────────────────────────────────────────
function cancelFeedback(btn) {
  const section    = btn.closest('.feedback-form-section');
  const triggerRow = section ? section.previousElementSibling : null;
  if (section)    section.classList.remove('open');
  if (triggerRow) triggerRow.style.display = '';
}

// ── 灯箱（图片放大） ─────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}

// ── 工具函数 ──────────────────────────────────────────────────────

/** HTML 转义，防止注入 */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/** 高亮搜索关键词 */
function hl(text) {
  const escaped = esc(text);
  if (!currentKw) return escaped;
  const safeKw = esc(currentKw).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(safeKw, 'gi'), m => `<mark>${m}</mark>`);
}

/** 格式化答案文本（支持 **粗体**、⚠️ 警告行、关键词高亮） */
function fmt(text) {
  let html = esc(text);
  // **粗体**
  html = html.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  // ⚠️ 警告行变橙色
  html = html.replace(/(⚠️[^\n]+)/g, '<span style="color:#fa8c16">$1</span>');
  // 搜索关键词高亮
  if (currentKw) {
    const safeKw = esc(currentKw).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    html = html.replace(new RegExp(safeKw, 'gi'), m => `<mark>${m}</mark>`);
  }
  return html;
}

// ── 事件委托（统一处理所有点击） ─────────────────────────────────
document.addEventListener('click', function (e) {
  // 分类标签
  const catBtn = e.target.closest('.cat-btn[data-cat]');
  if (catBtn) {
    currentCat = catBtn.dataset.cat;
    renderCats();
    render();
    return;
  }

  // FAQ 标题点击展开/收起
  const faqQ = e.target.closest('.faq-q');
  if (faqQ) {
    const card   = faqQ.closest('.faq-card');
    const isOpen = card.classList.contains('open');
    card.classList.toggle('open');
    // 关闭时重置反馈表单状态
    if (isOpen) {
      const ff  = card.querySelector('.feedback-form-section');
      const row = card.querySelector('.feedback-trigger-row');
      if (ff)  ff.classList.remove('open');
      if (row) row.style.display = '';
    }
    return;
  }

  // 反馈触发按钮
  const triggerBtn = e.target.closest('.trigger-btn[data-id]');
  if (triggerBtn) {
    const id      = triggerBtn.dataset.id;
    const section = document.getElementById('ff-' + id);
    const row     = triggerBtn.closest('.feedback-trigger-row');
    if (section) {
      section.classList.add('open');
      if (row) row.style.display = 'none';
      section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    return;
  }

  // 图片点击放大
  const imgEl = e.target.closest('img[data-src]');
  if (imgEl) {
    openLightbox(imgEl.dataset.src);
    return;
  }

  // 灯箱关闭
  if (e.target.id === 'lightbox' || e.target.id === 'lbClose') {
    closeLightbox();
  }
});

// 搜索框输入
document.getElementById('searchInput').addEventListener('input', function () {
  currentKw = this.value.trim();
  document.getElementById('clearIcon').style.display = currentKw ? 'block' : 'none';
  render();
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentKw = '';
  document.getElementById('clearIcon').style.display = 'none';
  render();
}

// ── 底部导航辅助函数 ─────────────────────────────────────────────
function setNavActive(id) {
  ['navHome','navSearch','navFeedback'].forEach(n => {
    const el = document.getElementById(n);
    if (el) el.classList.toggle('active', n === id);
  });
}
function navHome() {
  clearSearch();
  setNavActive('navHome');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navSearch() {
  setNavActive('navSearch');
  document.getElementById('searchInput').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function navFeedback() {
  setNavActive('navFeedback');
  // 无结果时直接显示，有结果时滚动到第一个反馈按钮
  const firstTrigger = document.querySelector('.trigger-btn');
  if (firstTrigger) {
    firstTrigger.closest('.faq-card').classList.add('open');
    firstTrigger.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => firstTrigger.click(), 400);
  }
}

// ── 启动 ──────────────────────────────────────────────────────────
init();
</script>
